<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>Rate Estimator</h1>

        <div class="tabs">
            <button class="tab-active">Air Freight</button>
            <button class="tab">Sea Freight</button>

        </div>

        <section class="route">
            <div class="field">
                <label for="origin">Origin Port</label>
                <select id="origin">
                    <option value="">Select origin...</option>
                </select>
            </div>

            <div class="field">
                <label for="destination">Destination Port</label>
                <select id="destination">
                    <option value="">Select Destination...</option>
                </select>
            </div>

        </section>


        <section class="dimension">
            <h2>Package Dimensions</h2>
            <div class="field">
                <label for="length">Length (cm)</label>
                <input type="number" id="length" min="0" value="0">
            </div>

            <div class="field">
                <label for="width">Width (cm)</label>
                <input type="number" id="width" min="0" value="0">
            </div>

            <div class="field">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" min="0" value="0">
            </div>

        </section>

        <section class="weight">
            <h2>Weight</h2>
            <div class="field">
                <label for="actual-weight">Actual Weight</label>
                <input type="number" id="actual-weight" min="0" value="0">
            </div>

            <div class="field">
                <label for="volumetric-weight">Volumetric Weighth (kg)</label>
                <p class="volumetric-weight">--</p>
            </div>
        </section>

        <button class="result" class="result">Calculation</button>
        <div id="result" class="result">
            <p>Billable weight: <span id="billable-weight">--</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
